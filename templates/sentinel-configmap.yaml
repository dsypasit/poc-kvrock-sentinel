{{- if eq .Values.mode "sentinel" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kvrocks-standalone.fullname" . }}-sentinel-config
  labels:
    app.kubernetes.io/name: {{ include "kvrocks-standalone.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/role: sentinel
data:
  sentinel.conf: |
    port {{ .Values.sentinel.port }}
    bind 0.0.0.0
    protected-mode no


    sentinel resolve-hostnames yes
    sentinel monitor {{ .Values.sentinel.masterName }} {{ include "kvrocks-standalone.fullname" . }}-master {{ .Values.kvrocks.port }} {{ .Values.sentinel.quorum }}
    sentinel down-after-milliseconds {{ .Values.sentinel.masterName }} {{ .Values.sentinel.downAfterMilliseconds }}
    sentinel failover-timeout {{ .Values.sentinel.masterName }} {{ .Values.sentinel.failoverTimeout }}
    sentinel parallel-syncs {{ .Values.sentinel.masterName }} {{ .Values.sentinel.parallelSyncs }}
{{- end }}
